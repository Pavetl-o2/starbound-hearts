<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340" width="420" height="340">
  <defs>
    <linearGradient id="jbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0a04"/>
      <stop offset="55%" stop-color="#0a0602"/>
      <stop offset="100%" stop-color="#150c02"/>
    </linearGradient>
    <!-- Reactor glow rising from below -->
    <radialGradient id="jreactor" cx="50%" cy="95%" r="65%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#c2410c" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
    <!-- Secondary warm fill from upper-left -->
    <radialGradient id="jambient" cx="25%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="jglow-sm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="jglow-lg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="jglow-eye" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="jclip"><rect width="420" height="340" rx="4"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="420" height="340" fill="url(#jbg)" clip-path="url(#jclip)"/>

  <!-- Circuit / schematic grid background -->
  <g clip-path="url(#jclip)" opacity="0.1" stroke="#f97316" stroke-width="0.5" fill="none">
    <!-- Main grid -->
    <line x1="0" y1="60" x2="420" y2="60"/>
    <line x1="0" y1="120" x2="420" y2="120"/>
    <line x1="0" y1="180" x2="420" y2="180"/>
    <line x1="0" y1="240" x2="420" y2="240"/>
    <line x1="0" y1="300" x2="420" y2="300"/>
    <line x1="52" y1="0" x2="52" y2="340"/>
    <line x1="104" y1="0" x2="104" y2="340"/>
    <line x1="156" y1="0" x2="156" y2="340"/>
    <line x1="208" y1="0" x2="208" y2="340"/>
    <line x1="260" y1="0" x2="260" y2="340"/>
    <line x1="312" y1="0" x2="312" y2="340"/>
    <line x1="364" y1="0" x2="364" y2="340"/>
  </g>
  <!-- Circuit traces (bottom-right corner) -->
  <g clip-path="url(#jclip)" opacity="0.2" stroke="#f97316" stroke-width="1" fill="none">
    <polyline points="310,340 310,295 345,295"/>
    <polyline points="345,295 345,275 380,275"/>
    <circle cx="345" cy="295" r="2.5" fill="#f97316" opacity="0.5"/>
    <polyline points="370,340 370,310 400,310"/>
    <circle cx="370" cy="310" r="2.5" fill="#f97316" opacity="0.5"/>
    <polyline points="390,340 390,320 420,320"/>
  </g>
  <!-- Circuit traces (top-left corner) -->
  <g clip-path="url(#jclip)" opacity="0.18" stroke="#f59e0b" stroke-width="1" fill="none">
    <polyline points="0,55 35,55 35,30 65,30"/>
    <circle cx="35" cy="55" r="2.5" fill="#f59e0b" opacity="0.5"/>
    <polyline points="0,85 20,85 20,100 55,100"/>
    <circle cx="20" cy="85" r="2.5" fill="#f59e0b" opacity="0.5"/>
    <polyline points="65,30 90,30 90,0"/>
    <circle cx="65" cy="30" r="2" fill="#f59e0b" opacity="0.4"/>
  </g>

  <!-- Reactor glow from below -->
  <ellipse cx="210" cy="340" rx="260" ry="160" fill="url(#jreactor)" clip-path="url(#jclip)"/>
  <!-- Ambient upper fill -->
  <ellipse cx="100" cy="70" rx="160" ry="100" fill="url(#jambient)" clip-path="url(#jclip)"/>

  <!-- ── Figure Silhouette ── -->
  <!-- Jumpsuit body — wider/sturdier than Vex -->
  <path d="M 138 340 L 138 210 Q 140 192 158 182 L 180 172 Q 195 165 210 163 Q 225 165 240 172 L 262 182 Q 280 192 282 210 L 282 340 Z" fill="#0d0702"/>

  <!-- Jumpsuit chest — slightly different tone to show fabric -->
  <path d="M 162 200 Q 180 210 210 210 Q 240 210 258 200 L 258 180 Q 248 170 235 165 Q 222 160 210 159 Q 198 160 185 165 Q 172 170 162 180 Z" fill="#110904"/>

  <!-- Jumpsuit collar / neckline -->
  <path d="M 190 162 L 200 175 L 210 178 L 220 175 L 230 162" stroke="#f97316" stroke-width="1.2" fill="none" opacity="0.4"/>

  <!-- Tool belt / utility belt -->
  <rect x="155" y="222" width="110" height="10" rx="2" fill="#1a0e04" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.35"/>
  <!-- Belt pouches -->
  <rect x="162" y="224" width="14" height="7" rx="1" fill="#0f0702" stroke="#c2410c" stroke-width="0.6" stroke-opacity="0.4"/>
  <rect x="182" y="224" width="10" height="7" rx="1" fill="#0f0702" stroke="#c2410c" stroke-width="0.6" stroke-opacity="0.4"/>
  <rect x="244" y="224" width="14" height="7" rx="1" fill="#0f0702" stroke="#c2410c" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Wrench tucked in belt -->
  <rect x="225" y="218" width="5" height="18" rx="2" fill="#2a1608" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.5"/>
  <ellipse cx="227.5" cy="218" rx="5" ry="3" fill="#2a1608" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Neck -->
  <rect x="202" y="148" width="16" height="18" rx="3" fill="#0e0602"/>

  <!-- Head — solid build, less delicate than Yuki/Vex -->
  <ellipse cx="210" cy="124" rx="46" ry="50" fill="#0e0602"/>

  <!-- Hair — messy, practical, shorter sides -->
  <!-- Back/volume -->
  <path d="M 165 108 Q 162 85 170 65 Q 180 42 210 38 Q 240 42 250 65 Q 258 85 255 108" fill="#0b0400"/>
  <!-- Messy strands / texture at sides -->
  <path d="M 165 108 Q 161 95 162 80 Q 163 65 170 55" stroke="#0b0400" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 255 108 Q 259 95 258 80 Q 257 65 250 55" stroke="#0b0400" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Crown messy bits -->
  <path d="M 195 40 Q 190 30 196 22 Q 203 14 210 16 Q 220 14 224 22 Q 228 30 222 40" fill="#0b0400"/>
  <!-- Flyaway strand -->
  <path d="M 192 40 Q 178 32 172 40 Q 168 46 174 52" stroke="#0b0400" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Another strand right -->
  <path d="M 236 38 Q 248 32 252 42 Q 254 50 248 56" stroke="#0b0400" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ── Eyes — direct, no-nonsense, warm amber ── -->
  <!-- Left eye glow -->
  <ellipse cx="193" cy="118" rx="18" ry="10" fill="#f97316" opacity="0.12" filter="url(#jglow-lg)"/>
  <!-- Right eye glow -->
  <ellipse cx="227" cy="118" rx="18" ry="10" fill="#f97316" opacity="0.12" filter="url(#jglow-lg)"/>

  <!-- Left eye — straighter shape, less cat-like than Vex, more direct -->
  <path d="M 180 118 Q 186 112 193 113 Q 200 112 206 118 Q 200 124 193 123 Q 186 124 180 118 Z" fill="#07030a"/>
  <ellipse cx="193" cy="118" rx="7.5" ry="6" fill="#f97316" filter="url(#jglow-eye)"/>
  <ellipse cx="193" cy="118" rx="4.5" ry="5" fill="#07030a"/>
  <!-- Slight amber ring -->
  <ellipse cx="193" cy="118" rx="2.5" ry="2.5" fill="#f59e0b" opacity="0.75"/>
  <!-- Highlight -->
  <circle cx="196" cy="116" r="1.3" fill="rgba(255,255,255,0.7)"/>

  <!-- Right eye -->
  <path d="M 214 118 Q 220 112 227 113 Q 234 112 240 118 Q 234 124 227 123 Q 220 124 214 118 Z" fill="#07030a"/>
  <ellipse cx="227" cy="118" rx="7.5" ry="6" fill="#f97316" filter="url(#jglow-eye)"/>
  <ellipse cx="227" cy="118" rx="4.5" ry="5" fill="#07030a"/>
  <ellipse cx="227" cy="118" rx="2.5" ry="2.5" fill="#f59e0b" opacity="0.75"/>
  <circle cx="230" cy="116" r="1.3" fill="rgba(255,255,255,0.7)"/>

  <!-- Slight furrowed brow — gives her the no-nonsense look -->
  <path d="M 182 110 Q 188 107 198 109" stroke="#0e0602" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 222 109 Q 232 107 238 110" stroke="#0e0602" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Mouth — slight smirk, not Vex's full smirk, not Yuki's shy smile -->
  <path d="M 202 137 Q 210 141 218 138" stroke="#c2410c" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Oil smudge on cheek (character detail) -->
  <ellipse cx="235" cy="130" rx="8" ry="3.5" fill="#1a0900" opacity="0.55" transform="rotate(-18, 235, 130)"/>

  <!-- Reactor glow highlight on face/body (warm light from below) -->
  <rect x="138" y="280" width="144" height="60" fill="url(#jreactor)" opacity="0.3" clip-path="url(#jclip)"/>

  <!-- Bottom fade -->
  <rect x="0" y="268" width="420" height="72" fill="#06030a" opacity="0.72" clip-path="url(#jclip)"/>

  <!-- Scan lines -->
  <rect width="420" height="340" fill="rgba(0,0,0,0.04)" clip-path="url(#jclip)"
    style="background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px)"/>

  <!-- ── UI Overlay ── -->
  <!-- Top status bar -->
  <rect x="0" y="0" width="420" height="20" fill="rgba(194,65,12,0.35)" clip-path="url(#jclip)"/>
  <text x="12" y="14" font-family="'Share Tech Mono', monospace" font-size="8.5" fill="#f97316" letter-spacing="2.2" opacity="0.9">ENGINEERING BAY · DECK 6 · STATUS: ONLINE</text>

  <!-- Bottom name bar -->
  <rect x="0" y="312" width="420" height="28" fill="rgba(6,3,0,0.9)" clip-path="url(#jclip)"/>
  <rect x="0" y="312" width="420" height="1" fill="rgba(249,115,22,0.4)"/>
  <text x="14" y="330" font-family="'Share Tech Mono', monospace" font-size="11" fill="#f97316" letter-spacing="2" font-weight="bold">JAX KANE</text>
  <text x="282" y="330" font-family="'Share Tech Mono', monospace" font-size="9" fill="#c2410c" letter-spacing="1.5">CHIEF ENGINEER</text>
</svg>
