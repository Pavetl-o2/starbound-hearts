<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340" width="420" height="340">
  <defs>
    <linearGradient id="vbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0520"/>
      <stop offset="60%" stop-color="#080118"/>
      <stop offset="100%" stop-color="#030008"/>
    </linearGradient>
    <radialGradient id="vaura" cx="50%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#5b21b6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vglow-l" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vglow-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="vblur-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="vblur-lg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="vglow-eye" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="vclip"><rect width="420" height="340" rx="4"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="420" height="340" fill="url(#vbg)" clip-path="url(#vclip)"/>

  <!-- Navigation grid -->
  <g clip-path="url(#vclip)" opacity="0.09" stroke="#7c3aed" stroke-width="0.6" fill="none">
    <line x1="0" y1="57" x2="420" y2="57"/>
    <line x1="0" y1="114" x2="420" y2="114"/>
    <line x1="0" y1="171" x2="420" y2="171"/>
    <line x1="0" y1="228" x2="420" y2="228"/>
    <line x1="0" y1="285" x2="420" y2="285"/>
    <line x1="60" y1="0" x2="60" y2="340"/>
    <line x1="120" y1="0" x2="120" y2="340"/>
    <line x1="180" y1="0" x2="180" y2="340"/>
    <line x1="240" y1="0" x2="240" y2="340"/>
    <line x1="300" y1="0" x2="300" y2="340"/>
    <line x1="360" y1="0" x2="360" y2="340"/>
  </g>

  <!-- Navigation arc (bottom-left, background detail) -->
  <g clip-path="url(#vclip)" fill="none" opacity="0.22">
    <circle cx="55" cy="280" r="50" stroke="#6d28d9" stroke-width="0.8"/>
    <circle cx="55" cy="280" r="32" stroke="#6d28d9" stroke-width="0.6"/>
    <line x1="5" y1="280" x2="105" y2="280" stroke="#6d28d9" stroke-width="0.6"/>
    <line x1="55" y1="230" x2="55" y2="330" stroke="#6d28d9" stroke-width="0.6"/>
    <circle cx="55" cy="255" r="3" fill="#c084fc" opacity="0.6"/>
  </g>

  <!-- Star chart dots (top-right) -->
  <g clip-path="url(#vclip)" opacity="0.35">
    <circle cx="355" cy="48" r="1.2" fill="#c084fc"/>
    <circle cx="372" cy="62" r="0.8" fill="#c084fc"/>
    <circle cx="342" cy="71" r="1" fill="#c084fc"/>
    <circle cx="385" cy="39" r="0.6" fill="#c084fc"/>
    <circle cx="363" cy="82" r="0.9" fill="#c084fc"/>
    <line x1="355" y1="48" x2="372" y2="62" stroke="#6d28d9" stroke-width="0.5"/>
    <line x1="355" y1="48" x2="342" y2="71" stroke="#6d28d9" stroke-width="0.5"/>
    <line x1="372" y1="62" x2="363" y2="82" stroke="#6d28d9" stroke-width="0.5"/>
  </g>

  <!-- Purple ambient atmosphere around figure -->
  <ellipse cx="210" cy="140" rx="170" ry="130" fill="url(#vaura)"/>

  <!-- ── Figure Silhouette ── -->
  <!-- Hair (back layer, long and sleek) -->
  <path d="M 165 110 Q 155 130 153 155 Q 151 175 158 195 Q 162 210 168 220" stroke="#0a0215" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 255 110 Q 265 130 267 155 Q 269 175 262 195 Q 258 210 252 220" stroke="#0a0215" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Body/torso -->
  <path d="M 150 340 L 150 215 Q 152 200 168 188 L 188 178 Q 200 172 210 170 Q 220 172 232 178 L 252 188 Q 268 200 270 215 L 270 340 Z" fill="#070115"/>

  <!-- Outfit neckline / collar detail -->
  <path d="M 188 178 Q 210 195 232 178" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 192 184 Q 210 198 228 184" stroke="#f59e0b" stroke-width="0.8" fill="none" opacity="0.25"/>
  <!-- Decorative vertical line / zipper -->
  <line x1="210" y1="192" x2="210" y2="260" stroke="#f59e0b" stroke-width="0.8" opacity="0.2"/>

  <!-- Neck -->
  <rect x="201" y="150" width="18" height="24" rx="4" fill="#090118"/>

  <!-- Head -->
  <ellipse cx="210" cy="122" rx="48" ry="52" fill="#090118"/>

  <!-- Hair (front, swept) -->
  <!-- Crown/top -->
  <path d="M 163 105 Q 160 78 170 60 Q 182 38 210 34 Q 238 38 250 60 Q 260 78 257 105" fill="#060010"/>
  <!-- Side sweeps -->
  <path d="M 163 105 Q 159 88 160 70 Q 162 55 167 48" fill="#060010"/>
  <path d="M 257 105 Q 261 88 260 70 Q 258 55 253 48" fill="#060010"/>
  <!-- Hair swept to one side detail -->
  <path d="M 163 105 Q 162 118 163 132 Q 164 148 168 162" stroke="#060010" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 167 52 Q 155 48 150 58 Q 148 68 155 75" fill="#060010"/>

  <!-- ── Eyes (cat-like, glowing gold) ── -->
  <!-- Left eye outer glow -->
  <ellipse cx="192" cy="117" rx="20" ry="11" fill="url(#vglow-l)" filter="url(#vblur-lg)" opacity="0.7"/>
  <!-- Right eye outer glow -->
  <ellipse cx="228" cy="117" rx="20" ry="11" fill="url(#vglow-r)" filter="url(#vblur-lg)" opacity="0.7"/>

  <!-- Left eye socket (cat almond shape) -->
  <path d="M 178 117 Q 185 109 192 110 Q 199 111 206 117 Q 199 124 192 123 Q 185 124 178 117 Z" fill="#04000d"/>
  <!-- Left iris -->
  <ellipse cx="192" cy="117" rx="8" ry="6" fill="#f59e0b" filter="url(#vglow-eye)"/>
  <!-- Left pupil (vertical slit) -->
  <ellipse cx="192" cy="117" rx="2.2" ry="5.5" fill="#03000a"/>
  <!-- Left highlight -->
  <circle cx="195" cy="115" r="1.4" fill="rgba(255,255,255,0.75)"/>

  <!-- Right eye socket -->
  <path d="M 214 117 Q 221 109 228 110 Q 235 111 242 117 Q 235 124 228 123 Q 221 124 214 117 Z" fill="#04000d"/>
  <!-- Right iris -->
  <ellipse cx="228" cy="117" rx="8" ry="6" fill="#f59e0b" filter="url(#vglow-eye)"/>
  <!-- Right pupil (vertical slit) -->
  <ellipse cx="228" cy="117" rx="2.2" ry="5.5" fill="#03000a"/>
  <!-- Right highlight -->
  <circle cx="231" cy="115" r="1.4" fill="rgba(255,255,255,0.75)"/>

  <!-- Smirk (asymmetric, right corner higher) -->
  <path d="M 200 138 Q 208 143 218 140" stroke="#c084fc" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Bottom fade -->
  <rect x="0" y="270" width="420" height="70" fill="#030008" opacity="0.75" clip-path="url(#vclip)"/>

  <!-- Scanline overlay -->
  <rect width="420" height="340" fill="none" clip-path="url(#vclip)"
    style="background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px)"/>

  <!-- ── UI Overlay ── -->
  <!-- Top classification bar -->
  <rect x="0" y="0" width="420" height="20" fill="rgba(91,33,182,0.45)" clip-path="url(#vclip)"/>
  <text x="12" y="14" font-family="'Share Tech Mono', monospace, monospace" font-size="8.5" fill="#c084fc" letter-spacing="2.5" opacity="0.95">CLASSIFIED · ID: VN-████ · ACCESS RESTRICTED</text>

  <!-- Bottom name bar -->
  <rect x="0" y="312" width="420" height="28" fill="rgba(3,0,8,0.88)" clip-path="url(#vclip)"/>
  <rect x="0" y="312" width="420" height="1" fill="rgba(192,132,252,0.4)"/>
  <text x="14" y="330" font-family="'Share Tech Mono', monospace, monospace" font-size="11" fill="#c084fc" letter-spacing="2" font-weight="bold">VEX NOIR</text>
  <text x="302" y="330" font-family="'Share Tech Mono', monospace, monospace" font-size="9" fill="#7c3aed" letter-spacing="1.5">NAVIGATOR</text>
</svg>
